spring.application.name=book-service
server.port=${SERVER_PORT:8086}

# Database (H2 in-memory)
spring.datasource.url=jdbc:h2:mem:bookdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=true
spring.cloud.inetutils.preferred-networks=10.

# JWT
jwt.secret=${JWT_SECRET:5367566859703373367639792F423F452848284D6251655468576D5A71347437}

# AWS SQS
aws.region=${AWS_REGION:us-east-1}
aws.sqs.queue-url=${USER_NAME_CHANGES_QUEUE_URL:http://localhost:4566/000000000000/user-name-changes}
aws.sqs.endpoint-override=${AWS_SQS_ENDPOINT_OVERRIDE:}

# User service URL (used for direct REST calls via load-balanced RestTemplate)
user.service.url=${USER_SERVICE_URL:http://user-service}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Graceful shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=8s
