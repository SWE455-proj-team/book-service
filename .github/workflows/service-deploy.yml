name: Service Build and Deploy

on:
  workflow_call:
    inputs:
      service_name:
        description: Service name (ECS service and ECR repo suffix)
        required: true
        type: string
      service_dir:
        description: Path to the service directory
        required: false
        default: .
        type: string
      project_name:
        description: Project name used in resource prefixes
        required: false
        default: library
        type: string
      environment:
        description: Environment name used in resource prefixes
        required: false
        default: prod
        type: string
      aws_region:
        description: AWS region for deployment
        required: false
        default: us-east-1
        type: string
      ecs_cluster:
        description: ECS cluster name override
        required: false
        type: string
      ecs_service:
        description: ECS service name override
        required: false
        type: string
      ecr_repository:
        description: Full ECR repository override (registry/repo)
        required: false
        type: string

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      IMAGE_TAG: ${{ github.sha }}
      AWS_REGION: ${{ inputs.aws_region }}
      PROJECT_NAME: ${{ inputs.project_name }}
      ENVIRONMENT: ${{ inputs.environment }}
      SERVICE_NAME: ${{ inputs.service_name }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -f "${{ inputs.service_dir }}/pom.xml" clean package -DskipTests --no-transfer-progress

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          SERVICE_DIR: ${{ inputs.service_dir }}
          SERVICE_NAME: ${{ inputs.service_name }}
          ECR_REPOSITORY_OVERRIDE: ${{ inputs.ecr_repository }}
        run: |
          if [ -n "${ECR_REPOSITORY_OVERRIDE}" ]; then
            REPO="${ECR_REPOSITORY_OVERRIDE}"
          else
            REPO="${ECR_REGISTRY}/${PROJECT_NAME}-${ENVIRONMENT}/${SERVICE_NAME}"
          fi

          echo "Using ECR repo: ${REPO}"
          docker build -t "${REPO}:${IMAGE_TAG}" -t "${REPO}:latest" "${SERVICE_DIR}"
          docker push "${REPO}:${IMAGE_TAG}"
          docker push "${REPO}:latest"

      - name: Force ECS service redeployment
        env:
          SERVICE_NAME: ${{ inputs.service_name }}
          ECS_CLUSTER_OVERRIDE: ${{ inputs.ecs_cluster }}
          ECS_SERVICE_OVERRIDE: ${{ inputs.ecs_service }}
        run: |
          CLUSTER="${ECS_CLUSTER_OVERRIDE}"
          SERVICE="${ECS_SERVICE_OVERRIDE}"

          if [ -z "${CLUSTER}" ]; then
            CLUSTER="${PROJECT_NAME}-${ENVIRONMENT}-cluster"
          fi

          if [ -z "${SERVICE}" ]; then
            SERVICE="${SERVICE_NAME}"
          fi

          aws ecs update-service \
            --cluster "${CLUSTER}" \
            --service "${SERVICE}" \
            --force-new-deployment \
            --region "${AWS_REGION}" \
            --no-cli-pager

      - name: Deployment summary
        run: |
          echo "### Deployment complete" >> $GITHUB_STEP_SUMMARY
          echo "- Service: ${SERVICE_NAME}" >> $GITHUB_STEP_SUMMARY
          echo "- Image tag: ${IMAGE_TAG}" >> $GITHUB_STEP_SUMMARY
